version: "3.9"

services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: anomaly-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - ./monitoring_data/prometheus:/textfile_collector:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/textfile_collector'
    networks:
      - monitoring
    restart: unless-stopped

  anomaly-exporter:
    image: python:3.11-slim
    container_name: anomaly-exporter
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir pandas prometheus-client &&
             python /app/prometheus_csv_exporter.py"
    ports:
      - "8001:8001"
    volumes:
      - ./docker/anomaly-exporter:/app:ro
      - ./monitoring_data:/monitoring_data:ro
    networks:
      - monitoring
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: anomaly-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    depends_on:
      - node-exporter
      - anomaly-exporter
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: anomaly-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  anomaly-files:
    image: nginx:alpine
    container_name: anomaly-files
    ports:
      - "8088:80"
    volumes:
      - ./monitoring_data:/usr/share/nginx/html:ro
    networks:
      - monitoring
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-storage: